name: Release (TestPyPI)

on:
  push:
    tags:
      - "test-[0-9]+.[0-9]+.[0-9]+"

jobs:
  publish-testpypi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Inject version and release date into CITATION.cff
        run: |
          export VERSION="${GITHUB_REF_NAME#test-}"
          export SETUPTOOLS_SCM_PRETEND_VERSION="${VERSION}"
          export DATE="$(date +%Y-%m-%d)"
          echo -e "VERSION=${VERSION}"
          echo -e "DATE=${DATE}"

          python - <<EOF
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          date = os.environ["DATE"]

          path = Path("CITATION.cff")
          lines = path.read_text(encoding="utf-8").splitlines()

          def replace_or_add(key, value):
              for i, line in enumerate(lines):
                  if line.startswith(f"{key}:"):
                      lines[i] = f'{key}: "{value}"'
                      return
              lines.append(f'{key}: "{value}"')

          replace_or_add("version", version)
          replace_or_add("date-released", date)

          path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          EOF

      - name: Build wheel and sdist
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ env.SETUPTOOLS_SCM_PRETEND_VERSION }}
        run: |
          python -m build --wheel --sdist

      - name: Publish to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          twine upload --repository testpypi dist/*

